version: 2

project_name: agentrepl

builds:
  - id: agentrepl
    main: ./cmd/agentrepl
    binary: agentrepl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Tag }}

archives:
  - id: agentrepl
    ids:
      - agentrepl
    formats:
      - tar.gz
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: ikigenba
    name: agentrepl

changelog:
  use: github
